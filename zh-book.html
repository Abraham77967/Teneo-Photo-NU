<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预约拍摄 | Teneo Photo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Quicksand:wght@500;700&family=Noto+Sans+SC:wght@400;500;700;900&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="booking-page wizard-mode">

    <div class="wizard-top-section">
        <a href="zh.html" class="back-home-btn">返回首页</a>
        <!-- Step 1 Calendar -->
        <div id="step1-header" class="calendar-section calendar-card">
            <h2 class="calendar-card-title">请选择一个日期！</h2>
            <div class="calendar-header">
                <button type="button" id="prev-month">&lt;</button>
                <span id="month-year-display">Month Year</span>
                <button type="button" id="next-month">&gt;</button>
            </div>
            <div class="calendar-days-header">
                <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
            </div>
            <div id="calendar-grid" class="calendar-grid"></div>
            <button type="button" id="change-date-btn" class="change-date-btn" style="display: none;">更换日期</button>
        </div>
        
        <!-- Steps 2-5 Header -->
        <div id="other-steps-header" class="wizard-header-nav" style="display: none;">
            <button type="button" id="wizard-back-btn" class="back-btn">&lt;</button>
            <h2 id="wizard-step-title" class="wizard-header-title">拍摄详情</h2>
        </div>
    </div>

    <div class="wizard-bottom-sheet">
        <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST" id="booking-form" style="display: flex; flex-direction: column; flex: 1;">
            
            <!-- Step 1: Date & Time -->
            <div class="wizard-step active" id="step-1">

                <input type="hidden" id="datetime-val" name="datetime" required>
                
                <div class="time-section">
                    <div class="custom-time-container">
                        <div class="time-display-wrapper">
                            <div class="time-display-col">
                                <span>开始时间</span>
                                <input type="text" id="time-start-input" class="time-readout" readonly value="8:00 AM">
                            </div>
                            <div class="time-display-divider">-</div>
                            <div class="time-display-col">
                                <span>结束时间</span>
                                <input type="text" id="time-end-input" class="time-readout" readonly value="10:00 AM">
                            </div>
                        </div>
                        <div class="dual-slider-wrapper">
                            <div class="dual-slider-track-container" id="dual-slider-track">
                                <div class="dual-slider-bg"></div>
                                <div class="dual-slider-fill" id="dual-slider-fill"></div>
                                <div class="dual-slider-thumb start-thumb" id="thumb-start"></div>
                                <div class="dual-slider-thumb end-thumb" id="thumb-end"></div>
                            </div>
                            <div class="dual-slider-ticks">
                                <span>8 AM</span>
                                <span>12 PM</span>
                                <span>4 PM</span>
                                <span>8 PM</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="wizard-nav-buttons">
                    <button type="button" class="btn-wizard-next" onclick="goToStep(2, '你的信息')">继续</button>
                </div>
            </div>

            <!-- Step 2: Personal Details -->
            <div class="wizard-step" id="step-2">
                
                
                <div class="form-group">
                    <label for="name">你的名字</label>
                    <input type="text" id="name" name="name" placeholder="张三" required>
                </div>
                <div class="form-group">
                    <label for="phone">电话号码</label>
                    <input type="tel" id="phone" name="phone" placeholder="(123) 456-7890" required>
                </div>

                <div class="form-group" style="margin-top: 2rem;">
                    <button type="button" id="add-person-btn" class="btn-secondary">添加一位朋友 (+ $15)</button>
                </div>

                <div id="friends-list"></div>

                <div class="wizard-nav-buttons">
                    <button type="button" class="btn-wizard-next" onclick="goToStep(3, '摄影风格偏好')">继续</button>
                </div>
            </div>

            <!-- Step 3: Style -->
            <div class="wizard-step" id="step-3">
                
                
                <div class="form-group">
                    <div class="radio-group">
                        <label class="radio-option">
                            <input type="radio" name="style" value="Classical">
                            <span class="radio-text"><strong>经典 / 正式</strong><br><small>奶油般虚化的背景，优雅永恒。</small></span>
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="style" value="Creative">
                            <span class="radio-text"><strong>创意 / 有张力</strong><br><small>超广角，极具表现力，有趣生动。</small></span>
                        </label>
                        <label class="radio-option" style="grid-column: 1 / -1;">
                            <input type="radio" name="style" value="IDK">
                            <span class="radio-text"><strong>不知道</strong><br><small>我们可以一起决定！</small></span>
                        </label>
                    </div>
                </div>

                <div class="form-group custom-style-container" style="margin-top: 2rem;">
                    <label>或描述自定义风格</label>
                    <textarea name="custom-style" placeholder="心里有具体的风格吗？在这里描述..."></textarea>
                    <div class="upload-btn" onclick="document.getElementById('photo-reference-input').click()">
                        <span>📷 添加照片参考 (选填)</span>
                    </div>
                    <input type="file" id="photo-reference-input" name="photo-references[]" multiple accept="image/*" style="display: none;">
                    <div id="photo-preview-container" class="photo-preview-grid"></div>
                </div>

                <div class="wizard-nav-buttons">
                    <button type="button" class="btn-wizard-next" onclick="goToStep(4, '期望拍摄地点')">继续</button>
                    <button type="button" class="btn-wizard-skip" onclick="goToStep(4, '期望拍摄地点')">跳过此步</button>
                </div>
            </div>

            <!-- Step 4: Locations -->
            <div class="wizard-step" id="step-4">
                
                
                <div class="custom-dropdown-list" id="location-dropdown-list" style="position: relative; box-shadow: none; border: none; margin-top: 0; padding: 0;">
                    <label class="dropdown-item">
                        <div class="img-wrapper"><img src="locations-photos/alma-mater.jpg" alt="Alma Mater"></div>
                        <span>Alma Mater 雕像</span>
                        <input type="checkbox" name="locations[]" value="Alma Mater" class="dropdown-checkbox">
                    </label>
                    <label class="dropdown-item">
                        <div class="img-wrapper"><img src="locations-photos/main-quad.jpg" alt="Main Quad"></div>
                        <span>Main Quad (主广场)</span>
                        <input type="checkbox" name="locations[]" value="Main Quad" class="dropdown-checkbox">
                    </label>
                    <label class="dropdown-item">
                        <div class="img-wrapper"><img src="locations-photos/foellinger.jpg" alt="Foellinger"></div>
                        <span>Foellinger 大礼堂</span>
                        <input type="checkbox" name="locations[]" value="Foellinger" class="dropdown-checkbox">
                    </label>

                    <label class="dropdown-item">
                        <div class="img-wrapper"><img src="locations-photos/hallene.jpg" alt="Hallene Gateway"></div>
                        <span>Hallene Gateway (校门)</span>
                        <input type="checkbox" name="locations[]" value="Hallene Gateway" class="dropdown-checkbox">
                    </label>
                    <div class="dropdown-item college-item">
                        <label class="college-label">
                            <div class="img-wrapper"><img src="assets/grad_cap.png" alt="College Building"></div>
                            <span>我的学院楼</span>
                            <input type="checkbox" name="locations[]" value="College Building" class="dropdown-checkbox college-checkbox">
                        </label>
                        <input type="text" class="college-input" placeholder="请输入学院楼名称...">
                    </div>
                    <div class="custom-location-adder">
                        <input type="text" id="custom-location-input-field" placeholder="我有其他想去的地方！">
                        <button type="button" id="add-custom-location-btn">添加</button>
                    </div>
                </div>

                <div class="wizard-nav-buttons">
                    <button type="button" class="btn-wizard-next" onclick="goToStep(5, '最后细节')">继续</button>
                    <button type="button" class="btn-wizard-skip" onclick="goToStep(5, '最后细节')">跳过此步</button>
                </div>
            </div>

            <!-- Step 5: Final Details -->
            <div class="wizard-step" id="step-5">
                
                
                <div class="form-group custom-style-container">
                    <label>额外备注或问题？(选填)</label>
                    <textarea name="notes" placeholder="在这里写下任何备注或问题..."></textarea>
                </div>

                <div class="deposit-notice">
                    <p><strong>注意：</strong> 提交表单后，需要通过 Venmo 或 Zelle 支付 $5 的定金来锁定你的档期。</p>
                </div>

                <div class="wizard-nav-buttons">
                    <button type="button" class="btn-wizard-next" onclick="goToStep(6, '预览详情')">预览详情</button>
                </div>
            </div>

            <!-- Step 6: Summary Review -->
            <div class="wizard-step" id="step-6">
                <div class="review-summary-card">
                    <div class="review-section" id="review-content">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <div class="deposit-notice">
                    <p><strong>注意：</strong> 提交表单后，需要通过 Venmo 或 Zelle 支付 $5 的定金来锁定你的档期。</p>
                </div>

                <div class="wizard-nav-buttons">
                    <button type="submit" class="btn-wizard-next">确认并提交预约</button>
                </div>
            </div>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
